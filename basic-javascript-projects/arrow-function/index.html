<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Arrow Function</title>
  </head>
  <body>
    <h2>Arrow Function Challenge</h2>

    <button onclick="sayHello()">Click Me</button>

    <script>
      // Normal function
    //   function sayHello() {
    //     alert("Hello! This is a normal function.");
    //   }

      // Arrow function
      const sayHello = () => {
        alert("Hello! This is an arrow function.");
      };
    </script>
  </body>
</html>
